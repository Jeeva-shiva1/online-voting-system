<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Online Voting System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/register.css" />
</head>
<body class="register-page">
  <div class="container">
    <div class="brand-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#6366f1"/>
        <path d="M12 20l6 6 10-12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Create Account</h1>
    <p class="subtitle">Register to cast your vote securely</p>

    <div class="input-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" autocomplete="name" />
    </div>
    <div class="input-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="input-group">
      <label for="registerNumber">Register Number</label>
      <input type="text" id="registerNumber" placeholder="e.g. CS2301" autocomplete="off" />
    </div>

    <button id="registerBtn" class="btn">Register Now</button>
    <div id="msg" class="msg hidden"></div>

    <div class="link-row">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script>
    const name = document.getElementById("name");
    const email = document.getElementById("email");
    const registerNumber = document.getElementById("registerNumber");
    const registerBtn = document.getElementById("registerBtn");
    const msg = document.getElementById("msg");

    function showMessage(text, error = false) {
      msg.textContent = text;
      msg.classList.remove("hidden", "error", "success");
      msg.classList.add(error ? "error" : "success");
    }

    function hideMessage() { msg.classList.add("hidden"); }

    registerBtn.addEventListener("click", async () => {
      const body = {
        name: name.value.trim(),
        email: email.value.trim(),
        register_number: registerNumber.value.trim()
      };

      if (!body.name || !body.email || !body.register_number) {
        showMessage("All fields required.", true);
        return;
      }

      hideMessage();
      registerBtn.disabled = true;
      registerBtn.textContent = "Registering...";

      try {
        const res = await fetch("http://localhost:3000/api/voters/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMessage(data.error || "Registration failed.", true);
          return;
        }

        showMessage("Registration successful! Redirecting...", false);
        setTimeout(() => {
          window.location.href = "login-otp.html";
        }, 1000);
      } catch (err) {
        showMessage("Network error. Check backend.", true);
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = "Register Now";
      }
    });
  </script>
</body>
</html>
