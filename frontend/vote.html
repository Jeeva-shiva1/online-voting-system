<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Your Vote | Online Voting System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/vote.css" />
</head>
<body>
  <div class="container">
    <h1>Cast Your Vote</h1>

    <div class="info-row">
      <p><strong>Email:</strong> <span id="voterEmail"></span></p>
      <p><strong>Register Number:</strong> <span id="voterRegisterNumber"></span></p>
    </div>

    <div id="votingSection">
      <h2 style="margin-bottom: 1.5rem;">Candidates</h2>
      <div class="candidates-list" id="candidatesList"></div>

      <button id="castVoteBtn" class="btn">Cast Vote</button>
      <div id="voteMsg" class="msg hidden"></div>
    </div>

    <div id="resultSection" class="hidden" style="margin-top: 2rem; text-align: center;">
      <h2 style="margin-bottom: 1rem;">Result</h2>
      <p style="font-size: 1.5rem; font-weight: 800; color: var(--success);">Winner: <span id="winnerName"></span></p>
    </div>
  </div>

  <script>
    const voterEmailSpan = document.getElementById("voterEmail");
    const voterRegisterNumberSpan = document.getElementById("voterRegisterNumber");
    const candidatesList = document.getElementById("candidatesList");
    const castVoteBtn = document.getElementById("castVoteBtn");
    const voteMsg = document.getElementById("voteMsg");
    const resultSection = document.getElementById("resultSection");
    const winnerName = document.getElementById("winnerName");

    const email = localStorage.getItem("voterEmail");
    const registerNumber = localStorage.getItem("voterRegister");

    if (!email || !registerNumber) {
      alert("You must log in first.");
      window.location.href = "login.html";
    } else {
      voterEmailSpan.textContent = email;
      voterRegisterNumberSpan.textContent = registerNumber;
    }

    // Load candidates
    async function loadCandidates() {
      try {
        const res = await fetch("http://localhost:3000/api/votes/candidates");
        const data = await res.json();

        if (!res.ok || !data.success) {
          showMessage("Failed to load candidates.", true);
          return;
        }

        const candidates = data.candidates;
        candidatesList.innerHTML = "";
        candidates.forEach((c) => {
          const div = document.createElement("div");
          div.classList.add("candidate-item");
          div.innerHTML = `
            <input type="radio" name="candidate" value="${c._id}" id="candidate-${c._id}" />
            <label for="candidate-${c._id}">${c.name}</label>
          `;
          div.addEventListener("click", () => {
            const radio = div.querySelector('input[type="radio"]');
            radio.checked = true;
            selectedCandidateId = radio.value;
            
            // Clear active state from others
            document.querySelectorAll('.candidate-item').forEach(item => item.classList.remove('active'));
            div.classList.add('active');
          });
          candidatesList.appendChild(div);
        });
      } catch (err) {
        showMessage("Network error loading candidates.", true);
      }
    }

    function showMessage(text, isError = false) {
      voteMsg.textContent = text;
      voteMsg.classList.remove("hidden", "error", "success");
      voteMsg.classList.add(isError ? "error" : "success");
    }

    castVoteBtn.addEventListener("click", async () => {
      if (!selectedCandidateId) {
        showMessage("Please select a candidate.", true);
        return;
      }

      const voterToken = localStorage.getItem("voterToken");
      if (!voterToken) {
        showMessage("Session expired. Please log in again.", true);
        return;
      }

      const confirmed = confirm("Confirm your vote? This action cannot be undone.");
      if (!confirmed) return;

      castVoteBtn.disabled = true;
      castVoteBtn.textContent = "Casting Vote...";

      try {
        // Sync with backend route: /api/votes/cast
        const res = await fetch("http://localhost:3000/api/votes/cast", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer ${voterToken}`
          },
          body: JSON.stringify({
            candidate_id: selectedCandidateId
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMessage(data.error || "Failed to cast vote.", true);
          return;
        }

        showMessage("Vote cast successfully!", false);
        localStorage.removeItem("votingAllowed");
        localStorage.removeItem("voterToken");
        
        setTimeout(() => {
          window.location.href = "result.html";
        }, 1500);

      } catch (err) {
        showMessage("Network error. Check backend.", true);
      } finally {
        castVoteBtn.disabled = false;
        castVoteBtn.textContent = "Cast Vote";
      }
    });

    loadCandidates();
  </script>
</body>
</html>
