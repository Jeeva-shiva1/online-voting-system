<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Online Voting System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/admin-login.css" />
</head>

<body class="admin-login-page">
  <div class="container">
    <div class="brand-logo">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="12" fill="#8b5cf6" />
        <path d="M22 14v6m0 0v6m0-6h6m-6 0h-6" stroke="white" stroke-width="2.5" stroke-linecap="round" />
      </svg>
    </div>
    <h1>Admin Login</h1>
    <p class="subtitle">Administrative access only</p>

    <div class="input-group">
      <label for="adminEmail">Admin Email</label>
      <input type="email" id="adminEmail" placeholder="admin@example.com" autocomplete="email" />
    </div>
    <div class="input-group">
      <label for="adminPassword">Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn" id="adminLoginBtn">Sign In</button>
    <div id="adminMsg" class="msg hidden"></div>
  </div>

  <script>
    const adminEmail = document.getElementById("adminEmail");
    const adminPassword = document.getElementById("adminPassword");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const adminMsg = document.getElementById("adminMsg");

    function showMessage(text, error) {
      adminMsg.textContent = text;
      adminMsg.classList.remove("hidden", "error", "success");
      adminMsg.classList.add(error ? "error" : "success");
    }

    function hideMessage() {
      adminMsg.classList.add("hidden");
    }

    // --- Admin login handler ---
    adminLoginBtn.addEventListener("click", async () => {
      const email = adminEmail.value.trim();
      const password = adminPassword.value.trim();

      hideMessage();

      if (!email || !password) {
        showMessage("Please fill both fields.", true);
        return;
      }

      adminLoginBtn.disabled = true;
      adminLoginBtn.textContent = "Signing in...";

      // In real app: send to backend API (e.g., /api/admin/login)
      try {
        const res = await fetch("http://localhost:3000/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMessage(data.error || "Login failed.", true);
          return;
        }

        // Store admin token / role in localStorage
        localStorage.setItem("adminToken", data.token);
        localStorage.setItem("adminEmail", email);

        showMessage("Login successful! Redirecting...", false);
        setTimeout(() => {
          window.location.href = "admin-dashboard.html";
        }, 1000);
      } catch (err) {
        showMessage("Network error. Check your backend.", true);
      } finally {
        adminLoginBtn.disabled = false;
        adminLoginBtn.textContent = "Sign In";
      }
    });
  </script>
</body>

</html>
