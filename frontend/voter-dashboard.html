<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voter Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/voter-dashboard.css" />
</head>
<body>
  <div class="container">
    <h1>Voter Dashboard</h1>

    <div class="status-row">
      Hello: <strong id="nameSpan">Loading...</strong> <br />
      Status: <strong id="votedStatus">Loading...</strong>
    </div>

    <div class="otp-form" id="otpForm">
      <h2 style="margin-bottom: 8px;">Request Vote OTP</h2>
      <button id="sendOtpBtn" class="btn primary">Send OTP to Email</button>
      <div id="otpMsg" class="msg hidden"></div>

      <div id="verifyOtpSection" class="hidden">
        <label>Enter 6‑digit OTP</label>
        <input type="text" id="otpInput" maxlength="6" style="margin-top: 4px;" />
        <button id="verifyOtpBtn" class="btn primary" style="margin-top: 10px;">Verify OTP</button>
      </div>
    </div>

    <div id="msg" class="msg hidden"></div>

    <div id="voteBtnContainer">
      <button id="goToVoteBtn" class="btn primary">Go to Vote</button>
    </div>

    <div class="link-row">
      <a href="result.html" id="viewResultLink">View Results</a>
    </div>
  </div>

  <script>
    const nameSpan = document.getElementById("nameSpan");
    const votedStatus = document.getElementById("votedStatus");
    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const otpMsg = document.getElementById("otpMsg");
    const verifyOtpSection = document.getElementById("verifyOtpSection");
    const otpInput = document.getElementById("otpInput");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const goToVoteBtn = document.getElementById("goToVoteBtn");
    const voteBtnContainer = document.getElementById("voteBtnContainer");
    const viewResultLink = document.getElementById("viewResultLink");
    const msg = document.getElementById("msg");

    const voterEmail = localStorage.getItem("voterEmail");
    const voterRegister = localStorage.getItem("voterRegister");

    if (!voterEmail || !voterRegister) {
      msg.textContent = "Session expired. Please log in again.";
      msg.classList.remove("hidden", "error");
      msg.classList.add("error");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
      throw new Error("No identity");
    }

    function showMessage(text, error = false) {
      msg.textContent = text;
      msg.classList.remove("hidden", "error", "success");
      msg.classList.add(error ? "error" : "success");
    }

    function hideMessage() { msg.classList.add("hidden"); }

    // --- Load voter status ---
    async function loadStatus() {
      try {
        // Use absolute URL to avoid issues with Live Server (port 5500)
        const res = await fetch(`http://localhost:3000/api/voters/status?email=${voterEmail}&register_number=${voterRegister}`);

        if (!res.ok) {
          throw new Error("Failed to load status");
        }

        const data = await res.json();

        if (!data.success) {
          throw new Error("Invalid user");
        }

        nameSpan.textContent = data.name;
        votedStatus.textContent = data.voted ? "Already voted" : "Voting pending";

        if (data.voted) {
          sendOtpBtn.disabled = true;
          sendOtpBtn.textContent = "Already voted";
          goToVoteBtn.disabled = true;
          goToVoteBtn.textContent = "Already voted";
        } else {
          // User can vote → show OTP
          sendOtpBtn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        showMessage("Could not load voter status. Is backend running?", true);
      }
    }

    // --- Send voting OTP ---
    sendOtpBtn.addEventListener("click", async () => {
      const body = {
        email: voterEmail,
        register_number: voterRegister
      };

      hideMessage();

      try {
        // Sync with backend route: /api/voters/generate-key
        const res = await fetch("http://localhost:3000/api/voters/generate-key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMessage(data.error || "Key request failed.", true);
          return;
        }

        otpMsg.textContent = "Key sent to your email (check console if not configured).";
        otpMsg.classList.remove("hidden", "error");
        otpMsg.classList.add("success");

        verifyOtpSection.classList.remove("hidden");
      } catch (err) {
        showMessage("Network error. Check backend.", true);
      }
    });

    // --- Verify voting Key and unlock vote ---
    verifyOtpBtn.addEventListener("click", async () => {
      const key = otpInput.value.trim();

      if (!key) {
        showMessage("Please enter your key.", true);
        return;
      }

      hideMessage();

      try {
        // Sync with backend route: /api/voters/verify-key
        const res = await fetch("http://localhost:3000/api/voters/verify-key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: voterEmail,
            register_number: voterRegister,
            key: key
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMessage(data.error || "Key verification failed.", true);
          return;
        }

        // Store JWT token for voting
        localStorage.setItem("voterToken", data.token);
        localStorage.setItem("votingAllowed", "true");

        goToVoteBtn.disabled = false;
        otpMsg.textContent = "Key verified. You can now vote.";
        otpMsg.classList.remove("hidden", "error");
        otpMsg.classList.add("success");

      } catch (err) {
        showMessage("Verification failed. Check backend.", true);
      }
    });

    // --- Go to vote page ---
    goToVoteBtn.addEventListener("click", () => {
      if (localStorage.getItem("votingAllowed") !== "true") {
        showMessage("Please verify OTP first.", true);
        return;
      }

      window.location.href = "vote.html";
    });

    // --- Load on page ready ---
    window.addEventListener("load", () => {
      loadStatus();
    });
  </script>
</body>
</html>
